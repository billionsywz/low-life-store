<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low Life Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: black;
}

.logo {
    color: gold;
    font-weight: bold;
    font-size: 22px;
}

.cart {
    background: gold;
    color: black;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
}

.container {
    padding: 15px;
}

.card {
    background: #1a1a1a;
    border-radius: 15px;
    margin-bottom: 20px;
    overflow: hidden;
}

.card img {
    width: 100%;
}

.card h3 {
    margin: 10px;
}

.price {
    color: gold;
    margin: 10px;
}

button {
    width: 90%;
    margin: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: gold;
    font-weight: bold;
}

.cart-box {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: black;
    padding: 15px;
    border-top: 2px solid gold;
}

</style>
</head>

<body>

<header>
    <div class="logo">🔥 Low Life Store 🔥</div>
    <div class="cart" onclick="showCart()">🛒 <span id="count">0</span></div>
</header>

<div class="container">

<!-- PRODUIT 1 -->
<div class="card">
<img src="https://i.imgur.com/1.jpg">
<h3>Sandal Fashion</h3>
<div class="price">5500 HTG</div>
<button onclick="addToCart('Sandal Fashion', 5500)">Ajoute nan panye</button>
</div>

<!-- PRODUIT 2 -->
<div class="card">
<img src="https://i.imgur.com/2.jpg">
<h3>Tenis Street</h3>
<div class="price">6000 HTG</div>
<button onclick="addToCart('Tenis Street', 6000)">Ajoute nan panye</button>
</div>

</div>

<!-- CART -->
<div class="cart-box" id="cartBox" style="display:none;">
<h3>Panye ou</h3>
<div id="items"></div>
<h3>Total: <span id="total">0</span> HTG</h3>

<p>Peman:
<br>MonCash: 50944011437
<br>NatCash: 43633428
</p>

<button onclick="orderWhatsApp()">Kòmande sou WhatsApp</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
    if(cart.length >= 3){
        alert("Stock limite (3)");
        return;
    }

    cart.push(name);
    total += price;

    document.getElementById("count").innerText = cart.length;
}

function showCart(){
    let box = document.getElementById("cartBox");
    box.style.display = box.style.display === "none" ? "block" : "none";

    let items = document.getElementById("items");
    items.innerHTML = "";

    cart.forEach(item => {
        items.innerHTML += "<p>"+item+"</p>";
    });

    document.getElementById("total").innerText = total;
}

function orderWhatsApp(){
    let message = "Bonjou, mwen vle kòmande:\n";
    cart.forEach(i => message += "- " + i + "\n");
    message += "Total: " + total + " HTG";

    window.open("https://wa.me/509XXXXXXXX?text=" + encodeURIComponent(message));
}
</script>

</body>
</html>
